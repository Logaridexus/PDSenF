/* ============================ 2. DASHBOARD ============================ */
function Dashboard() {
  const [phase, setPhase] = useState("idle"); // idle | analyzing | done
  const [pct, setPct] = useState(0);
  const [open, setOpen] = useState(1);

  useEffect(() => {
    if (phase !== "analyzing") return;
    setPct(0);
    const id = setInterval(() => {
      setPct((p) => {
        if (p >= 100) { clearInterval(id); setPhase("done"); return 100; }
        return Math.min(100, p + 3);
      });
    }, 70);
    return () => clearInterval(id);
  }, [phase]);

  const stage = pct < 35 ? "Reading document..." : pct < 70 ? "Identifying chapters..." : "Generating questions...";

  return (
    <div className="pb-6">

      <div style={{ background: `linear-gradient(135deg, ${C.primary}, ${C.primaryLite})`, padding: "52px 22px 24px", color: "#fff" }}>

            <span className="absolute" style={{ top: 10, right: 11, width: 9, height: 9, background: "#F59E0B", borderRadius: 999, border: "2px solid #1f5e87" }} />
          </div>
        </div>
      </div>

      <div className="px-4" style={{ marginTop: -8 }}>
        {/* upload zone */}
        <div className="flex flex-col items-center text-center"
             style={{ background: "#EAF0F6", border: `2px dashed ${C.primaryLite}`, borderRadius: 20, padding: "26px 18px", marginTop: 14 }}>
          <div className="flex items-center justify-center" style={{ width: 64, height: 64, background: "#DCE6F0", borderRadius: 18 }}>
            <UploadCloud size={30} color={C.primary} />
          </div>
          <h3 className="font-extrabold" style={{ color: C.ink, fontSize: 21, marginTop: 14 }}>Upload your PDF</h3>
          <p style={{ color: C.sub, fontSize: 14, marginTop: 4 }}>AI will analyze and generate quiz questions</p>
          <button onClick={() => setPhase("analyzing")}
                  className="flex items-center gap-2 font-bold active:scale-95 transition-transform"
                  style={{ background: C.primary, color: "#fff", borderRadius: 14, padding: "13px 22px", marginTop: 16, fontSize: 16, boxShadow: "0 8px 18px rgba(26,82,118,.28)" }}>
            <Upload size={18} /> + Select File

        </div>

        {/* progress card */}
        {phase === "analyzing" && (
          <div className="bg-white" style={{ borderRadius: 18, padding: 16, marginTop: 14, boxShadow: "0 8px 20px rgba(20,40,60,.06)" }}>
            <div className="flex items-center gap-3">
              <div className="flex items-center justify-center animate-pulse" style={{ width: 40, height: 40, background: "#EEF2F6", borderRadius: 12 }}>
                <Cpu size={20} color={C.primary} />
              </div>
              <div>
                <p className="font-bold" style={{ color: C.ink, fontSize: 15 }}>AI Analysis in Progress</p>
                <p style={{ color: C.sub, fontSize: 13 }}>Analyzing chapters and generating questions...</p>
              </div>
            </div>
            <div style={{ height: 8, background: "#E7EDF3", borderRadius: 999, marginTop: 14, overflow: "hidden" }}>
              <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg,${C.primary},${C.primaryLite})`, borderRadius: 999, transition: "width .15s linear" }} />
            </div>

            {CHAPTERS.map((ch) => {

              return (

              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================ 3. QUIZ (BICYCLE GAME) ============================ */
const STAGES = [
  { Icon: Home, label: "Home" },
  { Icon: GraduationCap, label: "University" },
  { Icon: BookOpen, label: "Library" },
  { Icon: Landmark, label: "Museum" },
  { Icon: Trophy, label: "Exam" },
];
// x position (%) of each checkpoint along the road
const CHECKPOINTS = [9, 31, 52, 72, 91];

function Quiz() {
  const [qi, setQi] = useState(2);          // start at "Question 3 of 5" like the mock
  const [sel, setSel] = useState(null);
  const [sheet, setSheet] = useState(null);  // null | "correct" | "wrong"
  const [done, setDone] = useState(false);

  const q = QUESTIONS[qi];

  const confirm = () => {
    if (sel === null) return;
    setSheet(sel === q.correct ? "correct" : "wrong");
  };
  const next = () => {
    setSheet(null);
    setSel(null);
    if (qi + 1 >= QUESTIONS.length) { setDone(true); return; }
    setQi(qi + 1);
  };
  const restart = () => { setDone(false); setQi(0); setSel(null); setSheet(null); };

  // bike rides to the current checkpoint; after confirming correct it nudges to the next
  const bikeIndex = done ? CHECKPOINTS.length - 1 : qi;

  return (
    <div className="relative h-full">
      {/* ===== TOP: game scene ===== */}
      <div className="relative" style={{ height: 360, overflow: "hidden" }}>
        <CitySceneSVG bikeIndex={bikeIndex} />

        {/* path badge */}
        <div className="absolute flex items-center justify-between bg-white"
             style={{ top: 52, left: 14, right: 14, borderRadius: 16, padding: "10px 12px", boxShadow: "0 8px 20px rgba(15,30,50,.18)" }}>
          <div className="flex items-center gap-2">
            <MapPin size={18} color={C.primary} />
            <span className="font-extrabold" style={{ color: C.primary, fontSize: 15 }}>
              Path to Exam: Question {Math.min(qi + 1, QUESTIONS.length)} of {QUESTIONS.length}
            </span>
          </div>
          <div className="flex items-center gap-1">
            {STAGES.map((s, i) => {
              const active = i === Math.min(qi, STAGES.length - 1);
              const passed = i < qi;
              return (
                <div key={i} className="flex items-center justify-center"
                     style={{ width: 22, height: 22, borderRadius: 999, background: active ? C.primary : passed ? "#cfe0ec" : "#E7EDF3", border: active ? "2px solid #F5B100" : "none" }}>
                  <s.Icon size={11} color={active ? "#fff" : C.primary} />
                </div>
              );
            })}
          </div>
        </div>

        {/* carousel dots */}
        <div className="absolute flex items-center justify-center gap-2" style={{ bottom: 8, left: 0, right: 0 }}>
          {QUESTIONS.map((_, i) => (
            <span key={i} style={{
              width: i === qi ? 22 : 8, height: 8, borderRadius: 999,
              background: i === qi ? C.primary : i < qi ? "#9fbdd3" : "#D5DDE5", transition: "all .3s",
            }} />
          ))}
        </div>
      </div>

      {/* ===== BOTTOM: quiz card (overlaps scene) ===== */}
      <div className="absolute left-0 right-0" style={{ top: 344, bottom: 0, background: C.bg, borderTopLeftRadius: 26, borderTopRightRadius: 26 }}>
        <div className="overflow-y-auto" style={{ height: "100%", padding: "18px 16px 130px", scrollbarWidth: "none" }}>
          {/* question card */}
          <div className="bg-white" style={{ borderRadius: 18, padding: 18, boxShadow: "0 8px 22px rgba(20,40,60,.07)" }}>
            <div className="inline-flex items-center gap-1.5" style={{ background: "#E5EFF7", borderRadius: 999, padding: "5px 11px", marginBottom: 12 }}>
              <BookOpen size={14} color={C.primary} />
              <span className="font-bold" style={{ color: C.primary, fontSize: 13 }}>{q.chapter}</span>
            </div>
            <p className="font-extrabold" style={{ color: C.ink, fontSize: 19, lineHeight: 1.35 }}>{q.q}</p>
          </div>

          {/* options */}
          <div style={{ marginTop: 14 }}>
            {q.options.map((opt, i) => {
              const chosen = sel === i;
              return (
                <button key={i} onClick={() => !sheet && setSel(i)} disabled={!!sheet}
                        className="w-full flex items-center gap-3 text-left transition-all active:scale-[.99]"
                        style={{
                          background: "#fff", borderRadius: 16, padding: "15px 16px", marginBottom: 12,
                          border: chosen ? `2px solid ${C.primary}` : "2px solid transparent",
                          boxShadow: chosen ? "0 8px 18px rgba(26,82,118,.16)" : "0 5px 14px rgba(20,40,60,.05)",
                        }}>
                  <span className="flex items-center justify-center font-bold flex-shrink-0"
                        style={{ width: 34, height: 34, borderRadius: 999, fontSize: 15, background: chosen ? C.primary : "#EEF2F6", color: chosen ? "#fff" : C.sub }}>
                    {String.fromCharCode(65 + i)}
                  </span>
                  <span className="font-medium" style={{ color: C.ink, fontSize: 16 }}>{opt}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* sticky confirm */}
        <div className="absolute left-0 right-0" style={{ bottom: 0, padding: "12px 16px 16px", background: C.bg, borderTop: `1px solid ${C.border}` }}>
          <button onClick={confirm} disabled={sel === null}
                  className="w-full font-extrabold active:scale-[.98] transition-transform"
                  style={{
                    borderRadius: 16, padding: 16, fontSize: 17,

                  }}>
            Confirm Answer
          </button>
        </div>
      </div>

      {/* ===== feedback bottom sheet ===== */}
      <BottomSheet
        open={!!sheet}
        correct={sheet === "correct"}
        explanation={q.explanation}
        answer={q.options[q.correct]}
        onNext={next}
        last={qi + 1 >= QUESTIONS.length}
      />

      {/* completion overlay */}
      {done && (
        <div className="absolute inset-0 flex items-center justify-center" style={{ background: "rgba(12,22,32,.55)", zIndex: 40 }}>
          <div className="bg-white text-center" style={{ borderRadius: 24, padding: 28, width: 280, boxShadow: "0 20px 50px rgba(0,0,0,.3)" }}>

              <Trophy size={32} color="#F5B100" />
            </div>
            <h3 className="font-extrabold" style={{ color: C.ink, fontSize: 22, marginTop: 14 }}>You reached the Exam Hall!</h3>
            <p style={{ color: C.sub, fontSize: 14, marginTop: 6 }}>All 5 questions complete. Great riding, Tena.</p>
            <button onClick={restart} className="w-full font-bold" style={{ background: C.primary, color: "#fff", borderRadius: 14, padding: 14, marginTop: 18, fontSize: 16 }}>
              Ride again
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// approximate road height following the curve
function roadY(pctX) {
  const t = pctX / 100;
  return 250 - 9 * Math.sin(Math.PI * t) + 2;
}

        return (
          <button key={id} onClick={() => setTab(id)} className="flex-1 flex flex-col items-center gap-1 active:scale-95 transition-transform" style={{ padding: "6px 0" }}>
            <div className="flex items-center justify-center" style={{ width: 44, height: 30, borderRadius: 12, background: on ? "#E5EFF7" : "transparent" }}>
              <Icon size={22} color={on ? C.primary : C.faint} strokeWidth={on ? 2.6 : 2} />
            </div>
            <span className="font-semibold" style={{ fontSize: 12, color: on ? C.primary : C.faint }}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}


createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
