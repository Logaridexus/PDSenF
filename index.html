<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDsenF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>html,body{margin:0;padding:0}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect } from "https://esm.sh/react@18.2.0";
import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
import { BookOpen, Star, Eye, EyeOff, Home, Zap, Target, BarChart3, Bell, UploadCloud, Upload, Cpu, ChevronDown, ChevronRight } from "https://esm.sh/lucide-react@0.383.0?deps=react@18.2.0";

const C = {
  primary: "#1A5276",
  primaryDark: "#143f5c",
  primaryLite: "#2c6e9e",
  bg: "#F8F9FA",
  ink: "#1B2B3A",
  sub: "#64748B",
  faint: "#94A3B8",
  border: "#E2E8F0",
  green: "#16A34A",
  greenBg: "#ECFDF3",
  orange: "#EA8C2B",
  orangeBg: "#FEF3E7",
  redBg: "#FEF2F2",
  red: "#DC2626",
};

const CHAPTERS = [
  { n: 1, title: "Foundations of Machine Learning", pages: "pp. 1–48", qs: 12, topics: ["Supervised Learning", "Loss Functions", "Gradient Descent"] },
  { n: 2, title: "Neural Network Architecture", pages: "pp. 49–102", qs: 18, topics: ["Perceptrons", "Backpropagation", "Activation Functions"] },
  { n: 3, title: "Convolutional Neural Networks", pages: "pp. 103–154", qs: 14, topics: ["Convolutions", "Pooling", "Feature Maps"] },
  { n: 4, title: "Recurrent Networks & LSTMs", pages: "pp. 155–198", qs: 10, topics: ["Sequences", "Vanishing Gradients", "Gates"] },
];

function AuthScreen({ onSignIn }) {
  const [show, setShow] = useState(false);
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");

  return (
    <div className="h-full overflow-y-auto" style={{ scrollbarWidth: "none" }}>
      <div className="px-6 pb-8" style={{ paddingTop: 56 }}>
        <div className="flex flex-col items-center" style={{ marginTop: 14 }}>
          <div className="flex items-center justify-center"
               style={{ width: 74, height: 74, background: C.primary, borderRadius: 22, boxShadow: "0 10px 24px rgba(26,82,118,.35)" }}>
            <BookOpen size={36} color="#fff" />
          </div>
          <h1 className="font-extrabold" style={{ color: C.primary, fontSize: 38, marginTop: 14, letterSpacing: -1 }}>PDsenF</h1>
          <p style={{ color: C.sub, fontSize: 16, marginTop: 2 }}>Your AI-powered learning companion</p>
          <div className="flex items-center gap-2" style={{ background: "#EEF2F6", padding: "7px 14px", borderRadius: 999, marginTop: 14 }}>
            <Star size={15} color="#F5B100" fill="#F5B100" />
            <span className="font-semibold" style={{ color: C.primary, fontSize: 13 }}>Trusted by 50,000+ students</span>
          </div>
        </div>

        <div className="bg-white" style={{ borderRadius: 24, padding: 24, marginTop: 26, boxShadow: "0 12px 30px rgba(20,40,60,.08)" }}>
          <h2 className="font-extrabold" style={{ color: C.ink, fontSize: 26 }}>Welcome back</h2>

          <p className="font-bold" style={{ color: C.sub, fontSize: 12, letterSpacing: 1, marginTop: 18 }}>EMAIL</p>
          <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@university.edu"
                 className="w-full outline-none"
                 style={{ background: "#EEF2F6", borderRadius: 14, padding: "15px 16px", fontSize: 15, color: C.ink, border: "none", marginTop: 8 }} />

          <p className="font-bold" style={{ color: C.sub, fontSize: 12, letterSpacing: 1, marginTop: 18 }}>PASSWORD</p>
          <div className="relative" style={{ marginTop: 8 }}>
            <input value={pw} onChange={(e) => setPw(e.target.value)} type={show ? "text" : "password"} placeholder="••••••••"
                   className="w-full outline-none"
                   style={{ background: "#EEF2F6", borderRadius: 14, padding: "15px 44px 15px 16px", fontSize: 15, color: C.ink, border: "none" }} />
            <button onClick={() => setShow(!show)} className="absolute" style={{ right: 14, top: 14, color: C.sub }}>
              {show ? <EyeOff size={20} /> : <Eye size={20} />}
            </button>
          </div>

          <div className="text-right" style={{ marginTop: 12 }}>
            <span className="font-semibold" style={{ color: C.primary, fontSize: 14 }}>Forgot password?</span>
          </div>

          <button onClick={onSignIn}
                  className="w-full font-bold active:scale-[.98] transition-transform"
                  style={{ background: C.primary, color: "#fff", borderRadius: 16, padding: "16px", fontSize: 17, marginTop: 16, boxShadow: "0 10px 22px rgba(26,82,118,.3)" }}>
            Sign In
          </button>
        </div>

        <p className="text-center" style={{ marginTop: 20, color: C.sub, fontSize: 15 }}>
          Don't have an account? <span className="font-bold" style={{ color: C.primary }}>Sign up free</span>
        </p>
      </div>
    </div>
  );
}

function Dashboard() {
  const [phase, setPhase] = useState("idle");
  const [pct, setPct] = useState(0);
  const [open, setOpen] = useState(1);

  useEffect(() => {
    if (phase !== "analyzing") return;
    setPct(0);
    const id = setInterval(() => {
      setPct((p) => {
        if (p >= 100) { clearInterval(id); setPhase("done"); return 100; }
        return Math.min(100, p + 3);
      });
    }, 70);
    return () => clearInterval(id);
  }, [phase]);

  const stage = pct < 35 ? "Reading document..." : pct < 70 ? "Identifying chapters..." : "Generating questions...";

  return (
    <div className="pb-6">
      <div style={{ background: `linear-gradient(135deg, ${C.primary}, ${C.primaryLite})`, padding: "52px 22px 24px", color: "#fff" }}>
        <div className="flex justify-between items-start">
          <div>
            <p style={{ opacity: .85, fontSize: 15 }}>Good morning 👋</p>
            <h1 className="font-extrabold" style={{ fontSize: 30, marginTop: 2 }}>Hello, Tena!</h1>
          </div>
          <div className="relative flex items-center justify-center" style={{ width: 46, height: 46, background: "rgba(255,255,255,.14)", borderRadius: 999 }}>
            <Bell size={22} color="#fff" />
            <span className="absolute" style={{ top: 10, right: 11, width: 9, height: 9, background: "#F59E0B", borderRadius: 999, border: "2px solid #1f5e87" }} />
          </div>
        </div>
      </div>

      <div className="px-4" style={{ marginTop: -8 }}>
        <div className="flex flex-col items-center text-center"
             style={{ background: "#EAF0F6", border: `2px dashed ${C.primaryLite}`, borderRadius: 20, padding: "26px 18px", marginTop: 14 }}>
          <div className="flex items-center justify-center" style={{ width: 64, height: 64, background: "#DCE6F0", borderRadius: 18 }}>
            <UploadCloud size={30} color={C.primary} />
          </div>
          <h3 className="font-extrabold" style={{ color: C.ink, fontSize: 21, marginTop: 14 }}>Upload your PDF</h3>
          <p style={{ color: C.sub, fontSize: 14, marginTop: 4 }}>AI will analyze and generate quiz questions</p>
          <button onClick={() => setPhase("analyzing")}
                  className="flex items-center gap-2 font-bold active:scale-95 transition-transform"
                  style={{ background: C.primary, color: "#fff", borderRadius: 14, padding: "13px 22px", marginTop: 16, fontSize: 16, boxShadow: "0 8px 18px rgba(26,82,118,.28)" }}>
            <Upload size={18} /> + Select File
          </button>
        </div>

        {phase === "analyzing" && (
          <div className="bg-white" style={{ borderRadius: 18, padding: 16, marginTop: 14, boxShadow: "0 8px 20px rgba(20,40,60,.06)" }}>
            <div className="flex items-center gap-3">
              <div className="flex items-center justify-center animate-pulse" style={{ width: 40, height: 40, background: "#EEF2F6", borderRadius: 12 }}>
                <Cpu size={20} color={C.primary} />
              </div>
              <div>
                <p className="font-bold" style={{ color: C.ink, fontSize: 15 }}>AI Analysis in Progress</p>
                <p style={{ color: C.sub, fontSize: 13 }}>Analyzing chapters and generating questions...</p>
              </div>
            </div>
            <div style={{ height: 8, background: "#E7EDF3", borderRadius: 999, marginTop: 14, overflow: "hidden" }}>
              <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg,${C.primary},${C.primaryLite})`, borderRadius: 999, transition: "width .15s linear" }} />
            </div>
            <p style={{ color: C.sub, fontSize: 13, marginTop: 8 }}>{pct}% — {stage}</p>
          </div>
        )}

        <h2 className="font-extrabold" style={{ color: C.ink, fontSize: 20, margin: "22px 2px 12px" }}>Chapters</h2>
        <div className="bg-white" style={{ borderRadius: 18, overflow: "hidden", boxShadow: "0 8px 20px rgba(20,40,60,.06)" }}>
          {CHAPTERS.map((ch) => {
            const isOpen = open === ch.n;
            return (
              <div key={ch.n} style={{ borderTop: ch.n > 1 ? `1px solid ${C.border}` : "none" }}>
                <button className="w-full flex items-center gap-3 text-left" style={{ padding: "16px" }}
                        onClick={() => setOpen(isOpen ? null : ch.n)}>
                  <div className="flex items-center justify-center flex-shrink-0 font-extrabold"
                       style={{ width: 36, height: 36, borderRadius: 10, background: isOpen ? C.primary : "#EEF2F6", color: isOpen ? "#fff" : C.sub, fontSize: 15 }}>
                    {ch.n}
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="font-bold truncate" style={{ color: C.ink, fontSize: 15 }}>{ch.title}</p>
                    <p style={{ color: C.faint, fontSize: 13 }}>{ch.pages} · {ch.qs} questions</p>
                  </div>
                  {isOpen ? <ChevronDown size={18} color={C.sub} /> : <ChevronRight size={18} color={C.sub} />}
                </button>
                {isOpen && (
                  <div style={{ padding: "0 16px 16px 16px", display: "flex", gap: 8, flexWrap: "wrap" }}>
                    {ch.topics.map((t) => (
                      <span key={t} className="font-semibold"
                            style={{ background: "#EEF2F6", color: C.primary, borderRadius: 999, padding: "5px 12px", fontSize: 13 }}>{t}</span>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function BottomNav({ tab, setTab }) {
  const items = [
    { id: "home", label: "Home", Icon: Home },
    { id: "quiz", label: "Quiz", Icon: Zap },
    { id: "goals", label: "Goals", Icon: Target },
    { id: "stats", label: "Stats", Icon: BarChart3 },
  ];
  return (
    <div className="flex items-stretch" style={{ background: "#fff", borderTop: `1px solid ${C.border}`, padding: "8px 8px 18px", boxShadow: "0 -6px 20px rgba(20,40,60,.06)" }}>
      {items.map(({ id, label, Icon }) => {
        const on = tab === id;
        return (
          <button key={id} onClick={() => setTab(id)} className="flex-1 flex flex-col items-center gap-1 active:scale-95 transition-transform" style={{ padding: "6px 0" }}>
            <div className="flex items-center justify-center" style={{ width: 44, height: 30, borderRadius: 12, background: on ? "#E5EFF7" : "transparent" }}>
              <Icon size={22} color={on ? C.primary : C.faint} strokeWidth={on ? 2.6 : 2} />
            </div>
            <span className="font-semibold" style={{ fontSize: 12, color: on ? C.primary : C.faint }}>{label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [signedIn, setSignedIn] = useState(false);
  const [tab, setTab] = useState("home");

  return (
    <div className="flex items-center justify-center min-h-screen w-full p-4"
         style={{ background: "linear-gradient(135deg,#e8edf2,#dfe6ee)", fontFamily: "ui-sans-serif, system-ui, sans-serif" }}>
      <div className="relative overflow-hidden"
           style={{
             width: 375, height: 812, background: C.bg, borderRadius: 44,
             border: "10px solid #0c1620",
             boxShadow: "0 30px 70px rgba(15,30,50,.45), 0 8px 20px rgba(0,0,0,.25)",
           }}>
        <div className="absolute left-1/2 z-30" style={{ top: 8, transform: "translateX(-50%)", width: 120, height: 26, background: "#0c1620", borderRadius: 20 }} />

        {!signedIn ? (
          <AuthScreen onSignIn={() => { setSignedIn(true); setTab("home"); }} />
        ) : (
          <div className="flex flex-col h-full">
            <div className="flex-1 overflow-y-auto" style={{ scrollbarWidth: "none" }}>
              {tab === "home" && <Dashboard />}
            </div>
            <BottomNav tab={tab} setTab={setTab} />
          </div>
        )}
      </div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
